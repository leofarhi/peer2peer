services:
  db:
    image: postgres:15-alpine
    container_name: peer2peer-db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecurepassword123!
      POSTGRES_DB: peer2peer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: